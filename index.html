<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK Paint & Supply - สีพ่นรถยนต์คุณภาพสูง</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 60px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            font-style: italic;
        }

        .logo-icon span {
            color: #1e90ff;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #1e90ff;
        }

        /* --- Hero Section Modified --- */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 60px;
            overflow: hidden;
        }

        /* ส่วนของรูปภาพพื้นหลัง */
        .hero-image-wrap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero-car-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ทำให้รูปขยายเต็มพื้นที่โดยไม่เสียสัดส่วน */
            object-position: right center; /* เน้นตัวรถที่อยู่ด้านขวา */
        }

        /* แผ่นสีดำไล่เฉดเพื่อให้ข้อความอ่านง่าย */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(10,10,10,1) 20%, rgba(10,10,10,0.6) 50%, rgba(10,10,10,0.3) 100%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            max-width: 650px;
            z-index: 3; /* อยู่เหนือรูปและ Overlay */
        }

        .hero-subtitle {
            color: #1e90ff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hero-subtitle::before {
            content: '';
            width: 30px;
            height: 2px;
            background: #1e90ff;
        }

        .hero-title {
            font-size: 56px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 25px;
        }

        .hero-title .highlight {
            color: #1e90ff;
        }

        .hero-desc {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-primary {
            background: #1e90ff;
            color: #fff;
            border: none;
            padding: 15px 35px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 15px 35px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* --- Tablet & Mobile Responsive --- */
        @media (max-width: 768px) {
            .navbar { padding: 15px 20px; }
            .nav-links { display: none; }
            
            .hero {
                padding: 0 20px;
                justify-content: center;
                text-align: center;
            }

            .hero-overlay {
                background: rgba(0,0,0,0.6); /* เน้นมืดทั้งจอเพื่อให้ข้อความเด่นในมือถือ */
            }

            .hero-title { font-size: 36px; }
            
            .hero-subtitle { justify-content: center; }
            
            .hero-buttons {
                flex-direction: column;
                width: 100%;
            }

            .hero-car-img {
                object-position: 70% center; /* ขยับรูปในมือถือให้เห็นตัวรถมากขึ้น */
            }
        }

        /* ส่วนอื่นๆ (คงเดิม) */
        .stats-section { padding: 80px 20px; text-align: center; background: #0f0f0f; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; max-width: 1200px; margin: 40px auto; }
        .stat-card { background: #1a1a1a; padding: 40px; border-radius: 15px; }
        .stat-number { font-size: 40px; color: #1e90ff; font-weight: 700; display: block; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-section">
            <div class="logo-icon">P<span>K</span></div>
            <div style="font-size: 12px; color: #ccc;">PAINT & SUPPLY</div>
        </div>
        <ul class="nav-links">
            <li><a href="#">หน้าแรก</a></li>
            <li><a href="#">สินค้า</a></li>
            <li><a href="#">ติดต่อเรา</a></li>
        </ul>
        <button class="btn-primary" style="padding: 8px 20px;">062-369-2663</button>
    </nav>

    <section class="hero">
        <!-- แผ่นกรองแสง -->
        <div class="hero-overlay"></div>
        
        <!-- รูปภาพพื้นหลัง (Mclaren P1) -->
        <div class="hero-image-wrap">
            <img src="2015-mclaren-p1-main.jpg" alt="Mclaren P1" class="hero-car-img">
        </div>

        <!-- เนื้อหาหน้าเว็บ -->
        <div class="hero-content">
            <div class="hero-subtitle">PK PAINT & SUPPLY</div>
            <h1 class="hero-title">
                สีพ่นรถยนต์คุณภาพสูง<br>
                <span class="highlight">สวย เงา ทนทาน</span>
            </h1>
            <p class="hero-desc">
                จำหน่ายสีพ่นรถยนต์และอุปกรณ์ครบวงจร มาตรฐานสากล<br>
                จัดส่งทั่วประเทศ พร้อมทีมงานให้คำปรึกษา
            </p>
            <div class="hero-buttons">
                <button class="btn-primary">เลือกดูสินค้า</button>
                <button class="btn-secondary">ติดต่อสอบถาม</button>
            </div>
        </div>
    </section>

    <section class="stats-section">
        <h2>ทำไมต้องเลือกเรา?</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-number">10+</span>
                <p>ปีประสบการณ์</p>
            </div>
            <div class="stat-card">
                <span class="stat-number">5,000+</span>
                <p>สินค้าพร้อมส่ง</p>
            </div>
            <div class="stat-card">
                <span class="stat-number">100%</span>
                <p>ความพึงพอใจ</p>
            </div>
        </div>
    </section>

</body>
</html>
